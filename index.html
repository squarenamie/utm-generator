    <style>
        .container {
            width: 80%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .input-wrapper input[type="text"] {
            width: 100%;
            max-width: 800px;
            height: 40px;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background-color: #f0f0f0;
            box-shadow: inset 0px 0px 2px rgba(0, 0, 0, 0.2);
            font-size: 16px;
        }

        .input-wrapper input[type="text"]:focus {
            outline: none;
            background-color: #ffffff;
            box-shadow: 0px 0px 2px rgba(0, 0, 0, 0.2), 0px 0px 4px rgba(0, 0, 0, 0.2);
        }


        .button-groups {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            margin: 0 20px;
        }

        .group-title {
            margin: 10px 0;
            font-size: 20px;
            text-align: center;
        }

        .btn {
            padding: 8px 16px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
        }

        .btn-facebook {
            background-color: #1877f2;
            background-image: linear-gradient(to bottom, #1e87f0, #166fe5);
        }

        .btn-line {
            background-color: #00c300;
            background-image: linear-gradient(to bottom, #00d400, #00bd00);
        }

        .btn-instagram {
            background-color: #833ab4;
            background-image: linear-gradient(to bottom, #a72bb3, #da22a7);
        }

        .btn-youtube {
            background-color: #ff0000;
            background-image: linear-gradient(to bottom, #ff0000, #e10000);
        }

        .btn-twitter {
            background-color: #1da1f2;
            background-image: linear-gradient(to bottom, #1da1f2, #0d8ecf);
        }

        .btn:focus,
        .btn:hover {
            outline: none;
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        .copy-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ffffff;
            border: 1px solid #cccccc;
            padding: 10px;
            font-size: 14px;
            color: #333333;
            z-index: 9999;
        }
    </style>
</head>

    <script>
        function addText(text) {
            var input = document.getElementById("input-url");
            var url = input.value.trim();
            var index = url.indexOf("?");
            if (index != -1) {
                url = url.substring(0, index);
            }
            var newUrl = url + "?" + text;
            navigator.clipboard.writeText(newUrl);

            // create the message element
            var message = document.createElement("div");
            message.innerText = "已複製到剪貼簿";
            message.classList.add("copy-message");
            document.body.appendChild(message);

            // set timeout to remove message after 2 seconds
            setTimeout(function () {
                document.body.removeChild(message);
            }, 2000);
        }
    </script>
